<style>
    .stretch-button{
        background-color: green;
        color: white;
        padding: 5px 7px;
        border: none;
        margin: 5px 6px;
        transition: padding 0.15s,
        margin 0.15s;
    }
    
    .stretch-button:hover{
        padding: 5px 12px;
        margin: 5px 1px;
    }

</style>

<button class="stretch-button">One</button>
<button class="stretch-button">Two</button>
<button class="stretch-button">Three</button>
<!-- When working with the margin and padding for the margins not to be noticeable
 you'll have to make sure the result of what you're increase the element by is not exceeding
 the result of the margin being stated -->
